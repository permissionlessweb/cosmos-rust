[workspace]
resolver = "2"
members = [
    "proto-build",
    "cosmos-sdk-proto",
    "cosmrs"
]

[workspace.dependencies]
# internal
cosmos-sdk-proto = { path = "cosmos-sdk-proto" }
# tendermint-rs (local fork)
tendermint       = { path = "../tendermint-rs/tendermint" }
tendermint-proto = { path = "../tendermint-rs/proto" }
tendermint-rpc   = { path = "../tendermint-rs/rpc", default-features = false }
