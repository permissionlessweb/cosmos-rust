[workspace]
resolver = "2"
members = [
    "proto-build",
    "cosmos-sdk-proto",
    "cosmrs"
]

[workspace.dependencies]
# internal
cosmos-sdk-proto = { version = "0.28.0", path = "cosmos-sdk-proto" }
# tendermint-rs (local fork)
tendermint = { git = "https://github.com/permissionlessweb/tendermint-rs", branch = "main" }
tendermint-proto = { git = "https://github.com/permissionlessweb/tendermint-rs", branch = "main" }
tendermint-rpc = { git = "https://github.com/permissionlessweb/tendermint-rs", branch = "main" }
